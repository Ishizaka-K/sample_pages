<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎁Happy Birthday Site</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2b;
      --panel-2: #18233a;
      --line: #2a3550;
      --text: #e8edf7;
      --muted: #97a3bd;
      --accent: #7dd3fc;
      --ok: #6ee7b7;
      --ng: #fca5a5;
      --shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(125, 211, 252, 0.08), transparent 25%),
        radial-gradient(circle at bottom left, rgba(110, 231, 183, 0.07), transparent 25%),
        var(--bg);
      color: var(--text);
    }

    .shell {
      width: min(860px, calc(100vw - 32px));
      margin: 48px auto;
    }

    .window {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)), var(--panel);
      box-shadow: var(--shadow);
      position: relative;
    }

    .window-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 52px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
    }

    .dots {
      display: flex;
      gap: 8px;
      margin-right: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #31405f;
    }

    .window-title {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .body {
      padding: 26px;
    }

    .headline {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 700;
    }

    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-2);
      padding: 16px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input {
      flex: 1;
      min-width: 0;
      height: 46px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0e1627;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.12);
    }

    button {
      height: 46px;
      padding: 0 18px;
      border: 1px solid #3b4b72;
      border-radius: 10px;
      background: linear-gradient(180deg, #1b2844, #16233d);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.ng {
      color: var(--ng);
    }

    .result {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      padding: 18px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .result.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .result.flash::after {
      content: "";
      position: absolute;
      inset: -40%;
      background: linear-gradient(
        120deg,
        transparent 25%,
        rgba(255,255,255,0.04) 40%,
        rgba(125,211,252,0.18) 50%,
        rgba(255,255,255,0.04) 60%,
        transparent 75%
      );
      animation: shine 1.1s ease;
    }

    @keyframes shine {
      from { transform: translateX(-40%); }
      to   { transform: translateX(40%); }
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .value {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .message {
      font-size: 26px;
      line-height: 1.7;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .sparkles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      box-shadow:
        0 0 10px rgba(255,255,255,0.65),
        0 0 18px rgba(125,211,252,0.45);
      opacity: 0;
      animation: pop 1.2s ease forwards;
    }

    @keyframes pop {
      0% {
        opacity: 0;
        transform: translateY(6px) scale(0.6);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-32px) scale(1.2);
      }
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 640px) {
      .body {
        padding: 18px;
      }

      .row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .message {
        font-size: 22px;
      }
    }

.message {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  font-size: 26px;
  line-height: 1.7;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.message-line {
  display: block;
  width: 100%;
  opacity: 1;
  transform: none;
  filter: none;
  animation: none;
}

.message-line + .message-line {
  margin-top: 6px;
}

.empty-line {
  display: block;
  width: 100%;
  height: 1.6em;
}

@keyframes lineFadeIn {
  0% {
    opacity: 0;
    transform: translateY(10px);
    filter: blur(4px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}
  </style>
</head>
<body>
  <main class="shell">
    <section class="window">
      <div class="window-bar">
        <div class="dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div class="window-title">Happy Birthday Site / local process</div>
      </div>

      <div class="body">
        <h1 class="headline">🎁Happy Birthday Site</h1>
        <p class="sub">
          Input a key and execute the local decode process.
          This tool runs entirely in the browser.
        </p>

        <div class="panel">
          <div class="row">
            <input id="keyInput" type="text" placeholder="Enter key" autocomplete="off" />
            <button id="decodeBtn" type="button">Run</button>
          </div>
          <div id="status" class="status"></div>
        </div>

        <div id="resultBox" class="result" aria-live="polite">
          <div class="sparkles" id="sparkles"></div>

          <div class="label">Title</div>
          <div id="titleText" class="value"></div>

          <div class="label">Output</div>
          <div id="messageText" class="message"></div>
        </div>

        <div class="footer-note">
          build target: browser / mode: static / source: sample_data.yml
        </div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
